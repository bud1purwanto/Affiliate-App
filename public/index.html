<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🧵 Threadsmil — Generator UTAS Affiliate</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">🧵 Threadsmil <span class="sub">Generator UTAS Affiliate</span></div>
      <div style="display:flex;align-items:center;gap:12px;">
        <div id="status-pills" class="pills"></div>
        <a href="/setup.html" style="color:#9a9a9a;text-decoration:none;font-size:13px">⚙ Setup</a>
      </div>
    </header>

    <main class="layout">
      <!-- ====== Panel kiri: input ====== -->
      <section class="panel">
        <h2>1. Produk Shopee</h2>
        <label>Link / URL produk Shopee</label>
        <input id="shopee-url" type="text" placeholder="https://shopee.co.id/... atau s.shopee.co.id/..." />

        <label>Sub ID (tracking) / Keyword</label>
        <input id="keyword" type="text" placeholder="contoh: jaket" />

        <div class="row">
          <button id="btn-shortlink" class="btn-secondary">🔗 Buat Short Link</button>
          <button id="btn-qr" class="btn-secondary">▦ Buat QR Code</button>
        </div>

        <button id="btn-search-product" class="btn-secondary full">🔍 Cari Produk di Shopee</button>
        <div id="shortlink-out" class="out hidden"></div>
        <div id="qr-out" class="qr hidden"></div>
        <div id="product-out" class="products"></div>

        <hr />

        <h2>2. Topic Threads</h2>
        <label>Community / Topic</label>
        <input id="topic" type="text" placeholder="contoh: fashion, OOTD" />

        <h2>3. Gaya UTAS</h2>
        <div class="grid2">
          <div>
            <label>Gaya</label>
            <select id="style">
              <option>Edukasi</option>
              <option selected>Storytelling</option>
              <option>Soft Selling</option>
              <option>Hard Selling</option>
              <option>Review</option>
              <option>Tips</option>
            </select>
          </div>
          <div>
            <label>Panjang</label>
            <select id="length">
              <option>Pendek (1-2 post)</option>
              <option selected>Sedang (3-5 post)</option>
              <option>Panjang (6-8 post)</option>
            </select>
          </div>
        </div>

        <label>Target audiens (opsional)</label>
        <input id="audience" type="text" placeholder="contoh: anak muda, pekerja kantoran" />

        <label>Model AI</label>
        <select id="model"></select>

        <button id="btn-generate" class="btn-primary full">✨ Generate UTAS</button>
      </section>

      <!-- ====== Panel kanan: hasil ====== -->
      <section class="panel result">
        <div class="result-head">
          <h2>Hasil UTAS</h2>
          <div class="row">
            <button id="btn-copy-all" class="btn-secondary" disabled>📋 Salin Semua</button>
            <button id="btn-post-threads" class="btn-primary" disabled>▶ Kirim ke Threads</button>
          </div>
        </div>
        <div id="warning" class="warning hidden"></div>
        <div id="posts" class="posts">
          <div class="empty">Hasil UTAS akan muncul di sini setelah klik <b>Generate UTAS</b>.</div>
        </div>
      </section>
    </main>
  </div>
  <script src="app.js"></script>
</body>
</html>
