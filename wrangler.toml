# Konfigurasi Cloudflare Pages.
# - Static frontend dilayani dari folder `public/`
# - API otomatis dari folder `functions/`
# - nodejs_compat dibutuhkan untuk node:crypto (signature Shopee)
name = "threadsmil"
pages_build_output_dir = "public"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# Sync riwayat lintas-device (opsional). Aktifkan dengan membuat KV namespace:
#   npx wrangler kv namespace create THREADSMIL_KV
# lalu isi id di bawah & uncomment, atau tambahkan binding via dashboard
# (Settings → Functions → KV namespace bindings, variable name: THREADSMIL_KV).
# [[kv_namespaces]]
# binding = "THREADSMIL_KV"
# id = "<KV_NAMESPACE_ID>"
